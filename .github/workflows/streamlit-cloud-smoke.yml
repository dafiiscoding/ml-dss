name: Streamlit cloud smoke

on:
  workflow_dispatch:
  push:
    paths:
      - "app/**"
      - "src/**"
      - "models/*.pkl"
      - "models/fusion_config.json"
      - "data/processed/**"
      - "reports/metrics/**"
      - "scripts/test_streamlit_cloud.py"
      - "scripts/verify_cloud_bundle.py"
      - ".streamlit/**"
      - ".github/workflows/streamlit-cloud-smoke.yml"
  pull_request:
    paths:
      - "app/**"
      - "src/**"
      - "models/*.pkl"
      - "models/fusion_config.json"
      - "data/processed/**"
      - "reports/metrics/**"
      - "scripts/test_streamlit_cloud.py"
      - "scripts/verify_cloud_bundle.py"
      - ".streamlit/**"

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: app/requirements.txt
      - name: Install cloud dependencies
        run: pip install -r app/requirements.txt
      - name: Verify deployment bundle
        run: python -m scripts.verify_cloud_bundle
      - name: Run Streamlit entrypoint smoke tests
        run: python -m scripts.test_streamlit_cloud
